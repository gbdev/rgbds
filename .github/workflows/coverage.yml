name: Code coverage report
on:
  - push
  - pull_request

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install deps
        shell: bash
        run: |
          ./.github/scripts/install_deps.sh ubuntu
      - name: Install LCOV
        run: |
          sudo apt-get install lcov
      - name: Install test dependency dependencies
        shell: bash
        run: |
          test/fetch-test-deps.sh --get-deps ubuntu
      - name: Generate coverage report
        run: |
          contrib/coverage.bash ubuntu-ci
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          # The top-level coverage/ directory is preserved after the wildcard pattern.
          path: */coverage/
          if-no-files-found: error
